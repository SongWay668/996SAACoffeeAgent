<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海风咖啡店 - 智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .config-bar {
            background: #f8f9fa;
            padding: 15px 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-item label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            min-width: 60px;
        }

        .config-item input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .config-item input:focus {
            border-color: #667eea;
        }

        .config-item input:disabled {
            background: #f5f5f5;
            color: #999;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .avatar {
            background: #4CAF50;
            color: white;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-container {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-container textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            min-height: 50px;
            max-height: 150px;
        }

        .input-container textarea:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #f44336;
            font-size: 14px;
            padding: 8px 12px;
            background: #ffebee;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
            max-width: 80%;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0s; }

        @keyframes typing {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .config-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <h1>海风咖啡 - 智能助手</h1>
        </div>

        <div class="config-bar">
            <div class="config-item">
                <label>用户ID:</label>
                <input type="text" id="userId" placeholder="请输入用户ID" maxlength="10">
            </div>
            <div class="config-item">
                <label>对话ID:</label>
                <input type="text" id="chatId" disabled placeholder="自动生成">
            </div>
        </div>

        <div id="errorContainer" class="error-message"></div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="message-content">您好!我是云边奶茶铺的智能助手,我可以帮您:</div>
            </div>
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="message-content">• 咨询产品、价格和口味<br>• 下单和查询订单<br>• 处理反馈和投诉<br><br>请问有什么可以帮到您?</div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-container">
            <textarea id="messageInput" placeholder="请输入您的问题..." rows="1"></textarea>
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const userIdInput = document.getElementById('userId');
        const chatIdInput = document.getElementById('chatId');
        const typingIndicator = document.getElementById('typingIndicator');
        const errorContainer = document.getElementById('errorContainer');

        let chatId = '';

        function generateChatId() {
            chatId = Date.now().toString();
            chatIdInput.value = chatId;
        }

        function showError(message) {
            errorContainer.textContent = message;
            errorContainer.style.display = 'block';
            setTimeout(() => {
                errorContainer.style.display = 'none';
            }, 5000);
        }

        function validateUserId(userId) {
            if (!userId || userId.trim() === '') {
                return '请输入用户ID';
            }
            if (userId.length > 10) {
                return '用户ID不能超过10个字符';
            }
            if (!/^[\u4e00-\u9fa5a-zA-Z0-9]+$/.test(userId)) {
                return '用户ID只能包含中文、字母和数字';
            }
            return null;
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.textContent = type === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;

            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);

            chatContainer.insertBefore(messageDiv, typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        async function sendMessage() {
            const userQuery = messageInput.value.trim();
            const userId = userIdInput.value.trim();

            const error = validateUserId(userId);
            if (error) {
                showError(error);
                return;
            }

            if (!userQuery) {
                showError('请输入消息');
                return;
            }

            if (!chatId) {
                showError('对话ID未生成');
                return;
            }

            addMessage(userQuery, 'user');
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('active');

            try {
                const params = new URLSearchParams({
                    chat_id: chatId,
                    user_query: userQuery,
                    user_id: userId
                });

                const response = await fetch(`/api/supervisor/stream?${params}`, {
                    method: 'GET'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessageDiv = addMessage('', 'assistant');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    assistantMessageDiv.innerHTML += chunk;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

            } catch (error) {
                console.error('Error:', error);
                showError('发送失败: ' + error.message);
            } finally {
                typingIndicator.classList.remove('active');
                sendButton.disabled = false;
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });

        generateChatId();
    </script>
</body>
</html>
