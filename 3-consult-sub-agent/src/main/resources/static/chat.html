<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡店咨询助手 - 流式对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.assistant::before {
            content: '☕';
            margin-right: 8px;
            font-size: 20px;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #ff4757;
        }

        .clear-btn:hover {
            background: #ff3344;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
        }

        .status {
            padding: 12px 20px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☕ 咖啡店咨询助手</h1>
            <p>流式对话体验 - 基于 ReactAgent</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">您好！我是咖啡店咨询助手，有什么可以帮助您的？</div>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="userId" placeholder="请输入用户ID（可选）" maxlength="10">
                <input type="text" id="chatId" placeholder="会话ID（可选，默认为随机）">
                <input type="text" id="userQuery" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
            </div>
            <button onclick="sendMessage()">发送</button>
            <button onclick="clearChat()" class="clear-btn">清空</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatIdInput = document.getElementById('chatId');
        const userQueryInput = document.getElementById('userQuery');
        const userIdInput = document.getElementById('userId');
        const statusDiv = document.getElementById('status');
        let chatId = '';

        function generateChatId() {
            return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function addMessage(type, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typing-indicator';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function showStatus(message) {
            statusDiv.textContent = message;
            statusDiv.classList.add('show');
        }

        function hideStatus() {
            statusDiv.classList.remove('show');
        }

        async function sendMessage() {
            const query = userQueryInput.value.trim();
            if (!query) return;

            // 生成或使用现有的 chatId
            if (!chatId) {
                chatId = chatIdInput.value.trim() || generateChatId();
                chatIdInput.value = chatId;
            }

            // 添加用户消息
            addMessage('user', query);
            userQueryInput.value = '';

            // 显示打字指示器
            addTypingIndicator();

            try {
                const userId = userIdInput.value.trim();
                const params = new URLSearchParams({
                    chat_id: chatId,
                    user_query: query
                });
                if (userId) {
                    params.append('user_id', userId);
                }
                const response = await fetch(`/api/chat/stream?${params}`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // 移除打字指示器，创建 AI 响应消息
                removeTypingIndicator();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                messageDiv.appendChild(contentDiv);
                chatContainer.appendChild(messageDiv);

                // 读取流式响应（Streamable-HTTP：纯文本流）
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    fullContent += chunk;
                    contentDiv.textContent = fullContent;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

            } catch (error) {
                removeTypingIndicator();
                showStatus('请求失败: ' + error.message);
                setTimeout(hideStatus, 3000);
                console.error('Error:', error);
            }
        }

        async function clearChat() {
            if (!chatId) {
                alert('请先发送消息');
                return;
            }

            try {
                await fetch(`/api/chat/clear?chat_id=${encodeURIComponent(chatId)}`);
                chatContainer.innerHTML = '<div class="message assistant"><div class="message-content">您好！我是咖啡店咨询助手，有什么可以帮助您的？</div></div>';
                chatId = '';
                chatIdInput.value = '';
                showStatus('会话已清空');
                setTimeout(hideStatus, 2000);
            } catch (error) {
                showStatus('清空失败: ' + error.message);
                setTimeout(hideStatus, 3000);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
